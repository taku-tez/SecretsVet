name: SecretsVet

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secretsvet:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required for uploading SARIF

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for git-scan

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install SecretsVet
        run: go install github.com/SecretsVet/secretsvet@latest

      # --- manifest scan (SARIF → GitHub Code Scanning) ---
      - name: Scan manifests
        run: |
          secretsvet scan . \
            --output sarif \
            --min-severity MEDIUM \
            > secretsvet.sarif
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: secretsvet.sarif
        if: always()

      # --- git-scan (PR: only new commits; push to main: full history) ---
      - name: Scan git history (PR — incremental)
        if: github.event_name == 'pull_request'
        run: |
          secretsvet git-scan . \
            --since ${{ github.event.pull_request.base.sha }} \
            --output github-actions \
            --exit-code

      - name: Scan git history (push to main — full)
        if: github.event_name == 'push'
        run: |
          secretsvet git-scan . \
            --output github-actions \
            --exit-code
