---
# SV2030: refreshInterval too long
# SV2040: creationPolicy Merge
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: production
spec:
  refreshInterval: 72h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Merge
  data:
    - secretKey: db-password
      remoteRef:
        key: prod/myapp/db
        property: password
    - secretKey: api-key
      remoteRef:
        key: prod/myapp//api
        property: key
    - secretKey: slack-token
      remoteRef:
        key: prod/myapp/db
        property: slack
---
# SV2010: missing remoteRef.key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bad-secret-ref
  namespace: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-store
    kind: SecretStore
  target:
    name: bad-secret
  data:
    - secretKey: password
      remoteRef:
        key: ""
        property: password
---
# SV2100: refreshInterval disabled
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: static-secret
  namespace: production
spec:
  refreshInterval: 0
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: static-secret
  data:
    - secretKey: token
      remoteRef:
        key: prod/static/token
        version: abc123def456
