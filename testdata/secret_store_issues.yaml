---
# SV2020: missing region and service
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: bad-aws-store
  namespace: production
spec:
  provider:
    aws:
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
# SV2020: valid AWS store (no findings expected)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: good-aws-store
  namespace: production
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
# SV2090: admin service account name
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-store
  namespace: production
spec:
  provider:
    gcpsm:
      projectID: my-project
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: gcp-admin-sa
