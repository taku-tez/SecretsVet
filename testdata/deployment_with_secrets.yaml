apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: app
          image: webapp:latest
          env:
            - name: AWS_ACCESS_KEY_ID
              value: AKIAIOSFODNN7EXAMPLE
            - name: AWS_SECRET_ACCESS_KEY
              value: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
            - name: DATABASE_PASSWORD
              value: "s3cr3t-passw0rd-123"
            - name: GITHUB_TOKEN
              value: ghp_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdef1234
            - name: NORMAL_VAR
              value: "not-a-secret"
          envFrom:
            - configMapRef:
                name: app-config
          args:
            - "--db-password=EXAMPLE_SuperSecretPassword123!"
